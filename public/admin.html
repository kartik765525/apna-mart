<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SUPPLY SETU ADMIN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Segoe UI,sans-serif;background:#f8f9fa;color:#333;}
.header{background:#ff6b35;color:white;padding:16px 20px;font-size:24px;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.lock-screen{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:9999;}
.lock-box{width:340px;background:#fff;padding:20px;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.2);}
.lock-box h2{margin-bottom:12px;color:#ff6b35;}
.lock-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-top:10px;}
.lock-box button{width:100%;margin-top:12px;padding:10px;border:none;border-radius:8px;background:#ff6b35;color:#fff;font-weight:600;cursor:pointer;}
.tabs{display:flex;gap:12px;padding:14px 18px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.tab-btn{padding:11px 18px;border:none;border-radius:10px;background:#f1f1f1;cursor:pointer;font-weight:600;}
.tab-btn.active{background:#ff6b35;color:#fff;}
.page-section{display:none;padding:18px;}
.page-section.active{display:block;}
.section-card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:16px;box-shadow:0 4px 10px rgba(0,0,0,.05);}
.section-title{font-size:22px;color:#ff6b35;margin-bottom:14px;}
.admin-input{width:100%;padding:11px;margin-top:10px;border:1px solid #ddd;border-radius:10px;outline:none;}
.grid-two{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.action-btn{border:none;border-radius:8px;padding:9px 14px;cursor:pointer;color:#fff;font-weight:600;margin-right:6px;margin-top:8px;}
.orange{background:#ff6b35;}.green{background:green;}.red{background:red;}.gray{background:#555;}.blue{background:#2563eb;}
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:15px;align-items:center;}
.category-pills{display:flex;gap:8px;flex-wrap:wrap;}
.cat-btn{padding:8px 14px;border:none;border-radius:20px;background:#f1f1f1;cursor:pointer;font-weight:600;}
.cat-btn.active{background:#ff6b35;color:#fff;}
.search-box{flex:1;min-width:240px;}
.search-box input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:12px;outline:none;}
.horizontal-list{display:flex;flex-direction:column;gap:12px;}
.product-row{display:grid;grid-template-columns: 1.2fr 1fr 1fr auto;gap:14px;align-items:center;border:1px solid #eee;border-radius:12px;padding:14px;background:#fafafa;}
.product-info{display:flex;align-items:center;gap:12px;}
.product-emoji{width:50px;height:50px;display:flex;align-items:center;justify-content:center;}
.manage-box{display:flex;flex-direction:column;gap:6px;}
.manage-label{font-size:13px;color:#666;font-weight:600;}
.manage-box input{padding:10px;border:1px solid #ddd;border-radius:10px;width:100%;}
.product-actions{display:flex;flex-direction:column;gap:8px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
.stat-card{background:#fafafa;border:1px solid #eee;border-radius:14px;padding:18px;box-shadow:0 4px 10px rgba(0,0,0,.04);}
.stat-label{font-size:14px;color:#666;margin-bottom:8px;font-weight:600;}
.stat-value{font-size:30px;font-weight:700;color:#ff6b35;}
.order-search{margin-bottom:15px;}
.order-search input{width:100%;padding:12px;border:1px solid #ddd;border-radius:12px;outline:none;}
.order-card{border:1px solid #eee;border-radius:12px;padding:14px;margin-bottom:12px;background:#fafafa;}
.badge{display:inline-block;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:5px;color:white;}
.badge-confirm{background:red;color:white;}.badge-pending{background:orange;color:white;}.badge-out{background:#2563eb;color:white;}.badge-delivered{background:green;color:white;}
.invoice-note{margin-top:10px;padding:10px 12px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;color:#9a3412;font-size:14px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:10000;}
.modal.show{display:flex;}.modal-card{width:min(900px, 100%);max-height:90vh;overflow:auto;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;}
.modal-body{padding:18px;}
.close-btn{border:none;background:#ef4444;color:#fff;border-radius:8px;padding:8px 12px;cursor:pointer;}
.invoice-box{border:1px solid #e5e7eb;border-radius:16px;padding:20px;background:#fff;}.invoice-top{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:20px;}.invoice-brand h2{color:#ff6b35;margin-bottom:4px;}.invoice-meta{text-align:right;}.invoice-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}.invoice-section{background:#fafafa;border:1px solid #eee;border-radius:12px;padding:14px;}.invoice-table{width:100%;border-collapse:collapse;margin-top:12px;}.invoice-table th,.invoice-table td{border:1px solid #e5e7eb;padding:10px;text-align:left;}.invoice-table th{background:#fff7ed;}.invoice-total{display:flex;justify-content:flex-end;margin-top:16px;}.invoice-total-box{width:320px;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;}.invoice-total-row{display:flex;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #e5e7eb;}.invoice-total-row:last-child{border-bottom:none;background:#ff6b35;color:#fff;font-weight:700;}.invoice-footer{margin-top:18px;padding-top:12px;border-top:1px dashed #cbd5e1;font-size:14px;color:#555;}
@media (max-width: 1000px){.product-row{grid-template-columns:1fr;}.product-actions{flex-direction:row;flex-wrap:wrap;}}
@media (max-width: 700px){.grid-two,.invoice-grid{grid-template-columns:1fr;}.invoice-meta{text-align:left;}}
@media print{body *{visibility:hidden;}#invoicePrintArea, #invoicePrintArea *{visibility:visible;}#invoicePrintArea{position:absolute;left:0;top:0;width:100%;background:#fff;padding:0;margin:0;}}
</style>
</head>
<body>
<div class="lock-screen" id="lockScreen">
    <div class="lock-box">
        <h2>🔒 Supply Setu Admin Login</h2>
        <p>Admin username aur password dalo</p>
        <input type="text" id="adminUsername" placeholder="Enter username">
        <input type="password" id="adminPassword" placeholder="Enter password">
        <button onclick="unlockAdmin()">Login Admin</button>
    </div>
</div>

<div class="header">
    <div>🛠 Supply Setu Admin</div>
    <button onclick="logoutAdmin()" style="background:red;color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;">
        Logout
    </button>
</div>
<div class="tabs">
    <button class="tab-btn active" id="tabAddBtn" onclick="showSection('add')">Add Product</button>
    <button class="tab-btn" id="tabStockBtn" onclick="showSection('stock')">Stock Manage</button>
    <button class="tab-btn" id="tabDashboardBtn" onclick="showSection('dashboard')">Dashboard</button>
    <button class="tab-btn" id="tabOrdersBtn" onclick="showSection('orders')">Orders</button>
    <button class="tab-btn" id="tabDeliveryBtn" onclick="showSection('delivery')">Delivery Boys</button>
    <button class="tab-btn" id="tabOffersBtn" onclick="showSection('offers')">Offers</button>
    <button class="tab-btn" id="tabCouponsBtn" onclick="showSection('coupons')">Coupons</button>
</div>

<div class="page-section active" id="sectionAdd">
    <div class="section-card">
        <div class="section-title">➕ Add Product</div>
        <input type="text" id="newName" placeholder="Product Name" class="admin-input">
        <div class="grid-two">
            <input type="number" id="newPrice" placeholder="Price" class="admin-input">
            <input type="number" id="newOriginal" placeholder="Original Price" class="admin-input">
        </div>
        <div class="grid-two">
            <input type="file" id="newImage" accept="image/*" class="admin-input">
            <input type="text" id="newCategory" placeholder="Category" class="admin-input">
        </div>
        <div id="imageUploadStatus" style="margin-top:8px;color:#666;font-size:14px;">No image selected</div>
        <input type="number" id="newStock" placeholder="Stock" class="admin-input">
        <button onclick="addNewProduct()" class="action-btn orange">Add Product</button>
    </div>
</div>

<div class="page-section" id="sectionStock">
    <div class="section-card">
        <div class="section-title">📦 Stock Manage</div>
        <div class="filter-bar">
            <div class="category-pills">
                <button class="cat-btn active" onclick="setStockCategory('All', this)">All</button>
                <button class="cat-btn" onclick="setStockCategory('Grocery', this)">Grocery</button>
                <button class="cat-btn" onclick="setStockCategory('Dairy', this)">Dairy</button>
                <button class="cat-btn" onclick="setStockCategory('Vegetables', this)">Vegetables</button>
                <button class="cat-btn" onclick="setStockCategory('Bakery', this)">Bakery</button>
            </div>
            <div class="search-box"><input type="text" id="stockSearch" placeholder="search here..." oninput="renderProducts()"></div>
        </div>
        <div id="productManager" class="horizontal-list"></div>
    </div>
</div>

<div class="page-section" id="sectionDashboard">
    <div class="section-card">
        <div class="section-title">📊 Dashboard / Analytics</div>
        <div id="dashboardStats" class="stats-grid"></div>
    </div>
</div>

<div class="page-section" id="sectionOrders">
    <div class="section-card">
        <div class="section-title">🧾 Orders</div>
        <div class="order-search"><input type="text" id="orderSearch" placeholder="search order id last 4 digit......" oninput="renderOrders()"></div>
        <div id="ordersManager"></div>
    </div>
</div>

<div class="page-section" id="sectionDelivery">
    <div class="section-card">
        <div class="section-title">🚚 Delivery Boy Approval</div>
        <div class="order-search"><input type="text" id="deliveryUserSearch" placeholder="search name or phone..." oninput="renderDeliveryUsers()"></div>
        <div id="deliveryUsersManager"></div>
    </div>
</div>



<div class="page-section" id="sectionOffers">
    <div class="section-card">
        <div class="section-title">🎁 Customer Offers Upload</div>
        <input type="text" id="offerTitle" placeholder="Offer Title" class="admin-input">
        <input type="text" id="offerSubtitle" placeholder="Offer Subtitle" class="admin-input">
        <div class="grid-two">
            <input type="text" id="offerCode" placeholder="Coupon Code" class="admin-input">
            <input type="datetime-local" id="offerValidTill" class="admin-input">
        </div>
        <div class="grid-two">
            <input type="file" id="offerImage" accept="image/*" class="admin-input">
            <input type="number" id="offerDiscount" placeholder="Discount %" class="admin-input">
        </div>
        <div id="offerImageStatus" style="margin-top:8px;color:#666;font-size:14px;">No offer image selected</div>
        <button onclick="addOfferItem()" class="action-btn orange">Add Offer</button>
        <div id="offersManager" style="margin-top:16px;"></div>
    </div>
</div>

<div class="page-section" id="sectionCoupons">
    <div class="section-card">
        <div class="section-title">🏷 Coupon Code Manage</div>
        <input type="text" id="couponCode" placeholder="Coupon Code" class="admin-input">
        <div class="grid-two">
            <input type="number" id="couponDiscount" placeholder="Discount Amount / %" class="admin-input">
            <input type="number" id="couponMaxUsers" placeholder="Max Users" class="admin-input">
            <input type="datetime-local" id="couponValidTill" class="admin-input">
        </div>
        <input type="text" id="couponType" placeholder="Type (flat / percent)" class="admin-input">
        <button onclick="addCouponItem()" class="action-btn orange">Add Coupon</button>
        <div id="couponsManager" style="margin-top:16px;"></div>
    </div>
</div>

<div class="modal" id="invoiceModal">
    <div class="modal-card">
        <div class="modal-header">
            <h3>Invoice Preview</h3>
            <div>
                <button onclick="printCurrentInvoice()" class="action-btn blue" style="margin-top:0;">Print</button>
                <button onclick="closeInvoiceModal()" class="close-btn">Close</button>
            </div>
        </div>
        <div class="modal-body"><div id="invoicePrintArea"></div></div>
    </div>
</div>

<div id="newOrderPopup" style="position:fixed; top:20px; right:20px; background:#16a34a; color:#fff; padding:14px 18px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.2); font-weight:700; z-index:12000; display:none; min-width:260px;">🔔 New order received!</div>

<script>
let products = [];
let orders = [];
let currentStockCategory = "All";
let activeSection = "add";
let currentInvoiceOrder = null;
let deliveryUsers = [];
let offers = [];
let coupons = [];
let lastKnownOrderIds = [];
let hasInitializedOrderWatcher = false;
const ADMIN_STORAGE_KEY = "apnaMartAdminToken";
let adminToken = localStorage.getItem(ADMIN_STORAGE_KEY) || "";

function getAuthHeaders(includeJson = true){
    const headers = {};
    if(includeJson) headers["Content-Type"] = "application/json";
    if(adminToken) headers["Authorization"] = `Bearer ${adminToken}`;
    return headers;
}

function logoutAdmin(){
    const confirmLogout = confirm("you want to logout");
    if(!confirmLogout) return;
    localStorage.removeItem(ADMIN_STORAGE_KEY);
    adminToken = "";
    document.getElementById("lockScreen").style.display = "flex";
    products = [];
    orders = [];
    deliveryUsers = [];
    document.getElementById("productManager").innerHTML = "";
    document.getElementById("ordersManager").innerHTML = "";
    document.getElementById("dashboardStats").innerHTML = "";
    document.getElementById("deliveryUsersManager").innerHTML = "";
    showSection("add");
}

function setActiveSection(sectionName){ activeSection = sectionName; localStorage.setItem("adminActiveSection", sectionName); }
function getActiveSection(){ return localStorage.getItem("adminActiveSection") || "add"; }

async function unlockAdmin(){
    const usernameInput = document.getElementById("adminUsername");
    const passwordInput = document.getElementById("adminPassword");

    if(!usernameInput || !passwordInput){
        alert("Login inputs nahi mil rahe");
        return;
    }

    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if(!username || !password){
        alert("Username aur password dono dalo");
        return;
    }

    try{
        const res = await fetch("/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => ({}));

        if(!res.ok || !data.token){
            alert(data.message || "Login failed");
            return;
        }

        adminToken = data.token;
        localStorage.setItem(ADMIN_STORAGE_KEY, data.token);

        const lockScreen = document.getElementById("lockScreen");
        if(lockScreen) lockScreen.style.display = "none";

        try{
            await loadAdmin();
        }catch(loadError){
            console.error("loadAdmin error:", loadError);
        }
    }catch(error){
        console.error("Admin login error:", error);
        alert("Backend login failed");
    }
}

async function checkAdminLogin(){
    adminToken = localStorage.getItem(ADMIN_STORAGE_KEY) || "";
    const lockScreen = document.getElementById("lockScreen");

    if(!adminToken){
        if(lockScreen) lockScreen.style.display = "flex";
        return false;
    }

    try{
        const res = await fetch("/api/admin/me", { headers: getAuthHeaders(false) });

        if(!res.ok){
            localStorage.removeItem(ADMIN_STORAGE_KEY);
            adminToken = "";
            if(lockScreen) lockScreen.style.display = "flex";
            return false;
        }

        if(lockScreen) lockScreen.style.display = "none";
        return true;
    }catch(error){
        console.error("Admin auth check error:", error);
        if(lockScreen) lockScreen.style.display = "flex";
        return false;
    }
}

document.addEventListener("change", function(e){
    if(e.target && e.target.id === "newImage"){
        const file = e.target.files[0];
        document.getElementById("imageUploadStatus").textContent = file ? `Selected: ${file.name}` : "No image selected";
    }
    if(e.target && e.target.id === "offerImage"){
        const file = e.target.files[0];
        const el = document.getElementById("offerImageStatus");
        if(el) el.textContent = file ? `Selected: ${file.name}` : "No offer image selected";
    }
});

document.addEventListener("DOMContentLoaded", function(){
    const passwordInput = document.getElementById("adminPassword");
    const usernameInput = document.getElementById("adminUsername");
    const loginBtn = document.querySelector(".lock-box button");

    if(loginBtn){
        loginBtn.addEventListener("click", function(e){
            e.preventDefault();
            unlockAdmin();
        });
    }

    [usernameInput, passwordInput].forEach(input => {
        if(!input) return;
        input.addEventListener("keydown", function(e){
            if(e.key === "Enter"){
                e.preventDefault();
                unlockAdmin();
            }
        });
    });
});

function showSection(name){
    setActiveSection(name);
    document.getElementById("sectionAdd").classList.remove("active");
    document.getElementById("sectionStock").classList.remove("active");
    document.getElementById("sectionOrders").classList.remove("active");
    document.getElementById("sectionDashboard").classList.remove("active");
    document.getElementById("sectionDelivery").classList.remove("active");
    document.getElementById("sectionOffers").classList.remove("active");
    document.getElementById("sectionCoupons").classList.remove("active");

    document.getElementById("tabAddBtn").classList.remove("active");
    document.getElementById("tabStockBtn").classList.remove("active");
    document.getElementById("tabOrdersBtn").classList.remove("active");
    document.getElementById("tabDashboardBtn").classList.remove("active");
    document.getElementById("tabDeliveryBtn").classList.remove("active");
    document.getElementById("tabOffersBtn").classList.remove("active");
    document.getElementById("tabCouponsBtn").classList.remove("active");

    if(name === "add"){
        document.getElementById("sectionAdd").classList.add("active");
        document.getElementById("tabAddBtn").classList.add("active");
    }else if(name === "stock"){
        document.getElementById("sectionStock").classList.add("active");
        document.getElementById("tabStockBtn").classList.add("active");
    }else if(name === "dashboard"){
        document.getElementById("sectionDashboard").classList.add("active");
        document.getElementById("tabDashboardBtn").classList.add("active");
    }else if(name === "delivery"){
        document.getElementById("sectionDelivery").classList.add("active");
        document.getElementById("tabDeliveryBtn").classList.add("active");
    }else if(name === "offers"){
        document.getElementById("sectionOffers").classList.add("active");
        document.getElementById("tabOffersBtn").classList.add("active");
    }else if(name === "coupons"){
        document.getElementById("sectionCoupons").classList.add("active");
        document.getElementById("tabCouponsBtn").classList.add("active");
    }else{
        document.getElementById("sectionOrders").classList.add("active");
        document.getElementById("tabOrdersBtn").classList.add("active");
    }
}

async function fetchProducts(){
    try{
        const res = await fetch("/api/products");
        products = await res.json();
    }catch(error){
        console.error("Fetch products error:", error);
        products = [];
    }
}

async function fetchOrders(){
    try{
        const res = await fetch("/api/orders", { headers: getAuthHeaders(false) });
        if(!res.ok) throw new Error("Orders fetch failed");
        orders = await res.json();
    }catch(error){
        console.error("Fetch orders error:", error);
        orders = [];
    }
}
async function fetchDeliveryUsers(){
    try{
        const res = await fetch("/api/admin/delivery-users", { headers: getAuthHeaders(false) });
        if(!res.ok) throw new Error("Delivery users fetch failed");
        deliveryUsers = await res.json();
    }catch(error){
        console.error("Delivery users fetch error:", error);
        deliveryUsers = [];
    }
}
async function fetchOffers(){
    try{
        const res = await fetch('/api/admin/offers', { headers: getAuthHeaders(false) });
        if(!res.ok) throw new Error('Offers fetch failed');
        offers = await res.json();
    }catch(error){
        console.error('Offers fetch error:', error);
        offers = [];
    }
}
async function fetchCoupons(){
    try{
        const res = await fetch('/api/admin/coupons', { headers: getAuthHeaders(false) });
        if(!res.ok) throw new Error('Coupons fetch failed');
        coupons = await res.json();
    }catch(error){
        console.error('Coupons fetch error:', error);
        coupons = [];
    }
}

function setStockCategory(category, button){
    currentStockCategory = category;
    document.querySelectorAll(".cat-btn").forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
    renderProducts();
}

function getApprovedDeliveryOptions(selectedId = ""){
    const approved = (deliveryUsers || []).filter(user => String(user.status || "") === "Approved");
    if(!approved.length){
        return '<option value="">No approved delivery boy</option>';
    }
    return '<option value="">Select Delivery Boy</option>' + approved.map(user => `
        <option value="${user.id}" ${String(selectedId) === String(user.id) ? "selected" : ""}>
            ${user.name} · ${user.phone}
        </option>
    `).join("");
}

function getAdminMapsLink(order){
    const lat = Number(order?.customerLocation?.latitude);
    const lng = Number(order?.customerLocation?.longitude);
    if(!Number.isFinite(lat) || !Number.isFinite(lng)) return "";
    return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
}

async function assignDeliveryBoy(orderId, deliveryBoyId){
    if(!deliveryBoyId){
        alert("Select delivery boy");
        return;
    }

    const res = await fetch(`/api/admin/orders/${orderId}/assign-delivery`, {
        method: "PATCH",
        headers: getAuthHeaders(true),
        body: JSON.stringify({ deliveryBoyId })
    });

    const data = await res.json().catch(() => ({}));
    if(!res.ok){
        alert(data.message || "Assign failed");
        return;
    }

    await fetchOrders();
    await fetchDeliveryUsers();
    renderOrders();
}

function renderProducts(){
    const manager = document.getElementById("productManager");
    const search = document.getElementById("stockSearch").value.trim().toLowerCase();

    let filtered = products.filter(product => {
        const matchCategory = currentStockCategory === "All" || product.category === currentStockCategory;
        const matchSearch = String(product.name || "").toLowerCase().includes(search);
        return matchCategory && matchSearch;
    });

    manager.innerHTML = filtered.length === 0
        ? "<p>No products found</p>"
        : filtered.map(product => `
            <div class="product-row">
                <div class="product-info">
                    <div class="product-emoji">
                        ${product.image ? `<img src="${product.image}" style="width:50px;height:50px;object-fit:cover;border-radius:10px;border:1px solid #ddd;">` : "🛒"}
                    </div>
                    <div>
                        <div style="font-weight:700;">${product.name}</div>
                        <div style="font-size:13px;color:#666;">Category: ${product.category || "N/A"}</div>
                        <div style="font-size:13px;color:#666;">Price: ₹${product.price} | Original: ₹${product.original}</div>
                    </div>
                </div>

                <div class="manage-box">
                    <div class="manage-label">Stock</div>
                    <input type="number" id="stock-${product.id}" value="${product.stock || 0}">
                </div>

                <div class="manage-box">
                    <div class="manage-label">Category</div>
                    <input type="text" id="category-${product.id}" value="${product.category || ""}">
                </div>

                <div class="product-actions">

function readFileAsDataURL(file){
    return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = ()=>resolve(reader.result || "");
        reader.onerror = ()=>reject(new Error("file read failed"));
        reader.readAsDataURL(file);
    });
}

async function addNewProduct(){
    const name = document.getElementById("newName").value.trim();
    const price = document.getElementById("newPrice").value.trim();
    const original = document.getElementById("newOriginal").value.trim();
    const category = document.getElementById("newCategory").value.trim();
    const stock = document.getElementById("newStock").value.trim();
    const imageFile = document.getElementById("newImage").files[0];

    if(!name || !price){
        alert("Name aur price required hain");
        return;
    }

    let imageUrl = "";
    try{
        if(imageFile){
            const formData = new FormData();
            formData.append("image", imageFile);
            const uploadRes = await fetch("/upload", {
                method: "POST",
                headers: adminToken ? { Authorization: `Bearer ${adminToken}` } : {},
                body: formData
            });
            const uploadData = await uploadRes.json().catch(() => ({}));
            if(!uploadRes.ok){
                alert(uploadData.message || "Image upload failed");
                return;
            }
            imageUrl = uploadData.imageUrl || "";
        }

        const res = await fetch("/api/products", {
            method: "POST",
            headers: getAuthHeaders(true),
            body: JSON.stringify({
                name,
                price: Number(price),
                original: Number(original || price),
                category,
                stock: Number(stock || 0),
                image: imageUrl
            })
        });

        const data = await res.json().catch(() => ({}));
        if(!res.ok){
            alert(data.message || "Add product failed");
            return;
        }

        document.getElementById("newName").value = "";
        document.getElementById("newPrice").value = "";
        document.getElementById("newOriginal").value = "";
        document.getElementById("newCategory").value = "";
        document.getElementById("newStock").value = "";
        document.getElementById("newImage").value = "";
        document.getElementById("imageUploadStatus").textContent = "No image selected";

        await fetchProducts();
        renderProducts();
        renderDashboard();
        alert("Product added successfully");
    }catch(error){
        console.error("Add product error:", error);
        alert("Add product failed");
    }
}

async function watchNewOrders(){
    await fetchOrders();
    const currentIds = orders.map(order => order.id);

    if(!hasInitializedOrderWatcher){
        lastKnownOrderIds = currentIds;
        hasInitializedOrderWatcher = true;
        return;
    }

    const hasNewOrder = currentIds.some(id => !lastKnownOrderIds.includes(id));
    if(hasNewOrder){
        showNewOrderPopup();
        renderOrders();
        renderDashboard();
    }

    lastKnownOrderIds = currentIds;
}

async function loadAdmin(){
    await fetchProducts();
    await fetchOrders();
    await fetchDeliveryUsers();
    try{ await fetchOffers(); }catch(error){ console.error("Offers fetch error:", error); }
    try{ await fetchCoupons(); }catch(error){ console.error("Coupons fetch error:", error); }
    renderProducts();
    renderDashboard();
    renderOrders();
    renderDeliveryUsers();
    renderOffers();
    renderCoupons();
    showSection(getActiveSection());
}

(async function(){
    const ok = await checkAdminLogin();
    if(ok){
        await loadAdmin();
        setInterval(watchNewOrders, 10000);
    }
})();
</script>
